name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ───────────────────────────────────
  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  backend-build:
    name: Backend - Docker Build
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t project-manager-backend ./backend

  # ─── Frontend Build ──────────────────────────────────
  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ─── Deploy Backend (example with Render) ────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          echo "🚀 Deploy triggered!"
          echo "Configure your Render/Railway/AWS deploy hook here."
          echo "Example: curl -X POST \$RENDER_DEPLOY_HOOK_URL"
        # Uncomment and configure for actual deploy:
        # env:
        #   RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        # run: curl -X POST "$RENDER_DEPLOY_HOOK_URL"

  # ─── Deploy Frontend (example with Vercel) ──────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Vercel
        run: |
          echo "🚀 Frontend deploy triggered!"
          echo "If using Vercel, automatic deploys are handled via Git integration."
          echo "Otherwise, configure your deploy command here."
