services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projectmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d projectmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/projectmanager
      SECRET_KEY: super-secret-key-for-dev
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      WEBAPP_URL: ${WEBAPP_URL:-}
      FIRST_ADMIN_EMAIL: admin@example.com
      FIRST_ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
